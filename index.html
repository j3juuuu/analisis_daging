<!DOCTYPE html>
<html>
<body>

<h2>Test API Vercel</h2>

<button onclick="test()">Cek API</button>

<p id="hasil"></p>

<script>
async function test() {
    const res = await fetch("/api/index");
    const data = await res.json();

    document.getElementById("hasil").innerText =
        data.status;
}
</script>

</body>
</html>
